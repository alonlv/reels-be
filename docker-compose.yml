version: '3.9'

services:
  db:
    image: postgres:16
    container_name: reels-db
    environment:
      POSTGRES_USER: reels
      POSTGRES_PASSWORD: reels
      POSTGRES_DB: reels
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reels"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reels-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://reels:reels@db:5432/reels
      # Azure Database for PostgreSQL requires TLS — set DB_SSLMODE=require there.
      # DB_SSLMODE: require
      MODEL_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma2:2b
      # To use an Azure Function as the LLM, set:
      # MODEL_PROVIDER: azure_function
      # AZURE_FUNCTION_URL: https://<app>.azurewebsites.net/api/llm
      # AZURE_FUNCTION_KEY: <functions key>
      # Auth: users are managed by SSO (Entra ID); flip PASSWORD_AUTH_ENABLED to
      # keep the legacy name + admin-password fallback.
      PASSWORD_AUTH_ENABLED: "true"
      # SSO_ENABLED: "true"
      # AZURE_TENANT_ID: <tenant guid>
      # AZURE_CLIENT_ID: <app client id>
      # ADMIN_EMAILS: you@yourcompany.com
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      SCAN_ENABLED: "true"
      SCAN_CRON: "0 * * * *"
      X_SYNC_INTERVAL_HOURS: "6"
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../reels-fe
      dockerfile: Dockerfile
    container_name: reels-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports: ["5173:5173"]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
