version: '3.9'

services:
  db:
    image: postgres:16
    container_name: reels-db
    environment:
      POSTGRES_USER: reels
      POSTGRES_PASSWORD: reels
      POSTGRES_DB: reels
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reels"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reels-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://reels:reels@db:5432/reels
      MODEL_PROVIDER: ollama
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma2:2b
      CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      SCAN_ENABLED: "true"
      SCAN_CRON: "0 */6 * * *"
      X_SYNC_INTERVAL_HOURS: "6"
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../reels-fe
      dockerfile: Dockerfile
    container_name: reels-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports: ["5173:5173"]
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  pgdata:
